on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    with_help: true

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run PR Agent
    steps:
      - name: PR Agent action
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: "ollama"
          OPENAI_BASE_URL: "https://mil.serveousercontent.com/"
          CONFIG.MODEL: "qwen2.5-coder:1.5b"
